<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Personal Objectives</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
padding:40px;
max-width:900px;
margin:auto;
}

h1{
margin-bottom:20px;
}

.form{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:30px;
}

input, textarea, select{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:12px;
}

button{
padding:10px 15px;
border:none;
background:black;
color:white;
cursor:pointer;
}

.objective{
background:white;
padding:15px;
border-radius:6px;
margin-bottom:10px;
}

.meta{
font-size:14px;
color:#555;
}

.private{
opacity:0.6;
}

</style>
</head>

<body>

<h1>Personal Objectives</h1>

<div class="form">

<input id="title" placeholder="Objective title">

<textarea id="description" placeholder="Description"></textarea>

<label>Frequency</label>
<select id="frequency">
<option value="Daily">Daily</option>
<option value="Weekly">Weekly</option>
<option value="Monthly">Monthly</option>
<option value="Yearly">Yearly</option>
</select>

<label>Days of week (optional)</label>
<input id="days" placeholder="mon,wed,fri">

<label>Dates (optional)</label>
<input id="dates" placeholder="1,15,30">

<label>Start date</label>
<input type="date" id="start">

<label>End date</label>
<input type="date" id="end">

<label>Visibility</label>
<select id="visibility">
<option value="private">Private</option>
<option value="public">Public</option>
</select>

<button onclick="createObjective()">Add Objective</button>

</div>

<h2>Your Objectives</h2>

<div id="objectives"></div>

<script>

let objectives = JSON.parse(localStorage.getItem("objectives")) || []

function save(){
localStorage.setItem("objectives", JSON.stringify(objectives))
}

function createObjective(){

const obj = {
id: Date.now(),
title: document.getElementById("title").value,
description: document.getElementById("description").value,
frequency: document.getElementById("frequency").value,
days: document.getElementById("days").value,
dates: document.getElementById("dates").value,
start: document.getElementById("start").value,
end: document.getElementById("end").value,
visibility: document.getElementById("visibility").value
}

objectives.push(obj)
save()
render()

document.querySelectorAll(".form input, .form textarea").forEach(i=>i.value="")
}

function deleteObjective(id){
objectives = objectives.filter(o => o.id !== id)
save()
render()
}

function render(){

const container = document.getElementById("objectives")
container.innerHTML = ""

objectives.forEach(o=>{

const div = document.createElement("div")
div.className = "objective"

if(o.visibility==="private"){
div.classList.add("private")
}

div.innerHTML = `
<h3>${o.title}</h3>
<p>${o.description}</p>

<div class="meta">
Frequency: ${o.frequency}<br>
Days: ${o.days || "-"}<br>
Dates: ${o.dates || "-"}<br>
Start: ${o.start || "-"}<br>
End: ${o.end || "-"}<br>
Visibility: ${o.visibility}
</div>

<button onclick="deleteObjective(${o.id})">Delete</button>
`

container.appendChild(div)

})

}

render()

</script>

</body>
</html>
